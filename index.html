<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Нателла</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; background:#020006; overflow:hidden;
    touch-action:none; -webkit-tap-highlight-color:transparent;
  }
  #stage { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; }

  .vignette {
    position:fixed; inset:0; pointer-events:none; z-index:5;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%);
  }

  .bar {
    position:fixed; left:0; right:0; height:6vh; background:#000;
    z-index:6; opacity:0; transform:scaleY(0);
    transition: opacity 2.2s ease 0.6s, transform 2.2s ease 0.6s;
    pointer-events:none;
  }
  .bar.top { top:0; transform-origin:top; }
  .bar.bottom { bottom:0; transform-origin:bottom; }
  .bar.show { opacity:1; transform:scaleY(1); }
</style>
</head>
<body>

<div id="stage"><canvas id="c"></canvas></div>
<div class="vignette"></div>
<div class="bar top" id="barTop"></div>
<div class="bar bottom" id="barBottom"></div>

<script>
(function(){
"use strict";

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha:false });

const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || Math.min(window.innerWidth, window.innerHeight) < 760;
let W = window.innerWidth, H = window.innerHeight;
let DPR = Math.min(window.devicePixelRatio || 1, isMobile ? 1.6 : 2);

function resizeCanvas(){
  W = window.innerWidth; H = window.innerHeight;
  DPR = Math.min(window.devicePixelRatio || 1, isMobile ? 1.6 : 2);
  canvas.width = Math.floor(W*DPR);
  canvas.height = Math.floor(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resizeCanvas();

/* ---------- glow sprites ---------- */
function makeSprite(rgb, size){
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  grad.addColorStop(0, `rgba(${rgb},1)`);
  grad.addColorStop(0.35, `rgba(${rgb},0.85)`);
  grad.addColorStop(1, `rgba(${rgb},0)`);
  g.fillStyle = grad;
  g.beginPath(); g.arc(size/2,size/2,size/2,0,Math.PI*2); g.fill();
  return c;
}
const SPR_SIZE = 48;
const spritePink  = makeSprite('255,80,165', SPR_SIZE);
const spriteGold  = makeSprite('255,205,110', SPR_SIZE);
const spriteWhite = makeSprite('255,255,255', SPR_SIZE);

/* ---------- stars ---------- */
let stars = [];
function buildStars(){
  const count = isMobile ? 220 : 380;
  stars = [];
  for(let i=0;i<count;i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H,
      r: Math.random()*1.4 + 0.3,
      base: Math.random()*0.5 + 0.35,
      speed: Math.random()*0.002 + 0.0008,
      phase: Math.random()*Math.PI*2
    });
  }
}
buildStars();

/* ---------- falling stars (meteors) ---------- */
let meteors = [];
function spawnMeteor(){
  meteors.push({
    x: Math.random()*W,
    y: -20,
    vx: (Math.random()*0.6+0.5) * (Math.random()<0.5?-1:1) * 60,
    vy: (Math.random()*0.6+0.9) * 140,
    life: 1,
    len: Math.random()*60+40
  });
}

/* ---------- flashes ---------- */
let flashes = [];
function spawnFlash(x,y){
  flashes.push({ x, y, r:0, maxR: Math.max(W,H)*0.55, alpha:0.55 });
}

/* ---------- text sampling ---------- */
function sampleText(text, fontPx, maxPoints){
  const pad = fontPx*0.6;
  const tmp = document.createElement('canvas');
  const tctx = tmp.getContext('2d');
  tctx.font = `bold ${fontPx}px Arial, sans-serif`;
  let tw = tctx.measureText(text).width;
  tmp.width = Math.ceil(tw + pad*2);
  tmp.height = Math.ceil(fontPx*1.6);
  tctx.font = `bold ${fontPx}px Arial, sans-serif`;
  tctx.fillStyle = '#fff';
  tctx.textAlign = 'center';
  tctx.textBaseline = 'middle';
  tctx.fillText(text, tmp.width/2, tmp.height/2);

  const data = tctx.getImageData(0,0,tmp.width,tmp.height).data;
  const pts = [];
  const step = isMobile ? 3 : 2;
  for(let y=0;y<tmp.height;y+=step){
    for(let x=0;x<tmp.width;x+=step){
      const a = data[(y*tmp.width+x)*4+3];
      if(a > 120){
        pts.push({ x: x - tmp.width/2, y: y - tmp.height/2 });
      }
    }
  }
  // shuffle
  for(let i=pts.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    const tmp2 = pts[i]; pts[i]=pts[j]; pts[j]=tmp2;
  }
  return pts.length > maxPoints ? pts.slice(0,maxPoints) : pts;
}

function fitFontToWidth(text, startPx, maxWidthRatio){
  const tmp = document.createElement('canvas').getContext('2d');
  let px = startPx;
  tmp.font = `bold ${px}px Arial, sans-serif`;
  let tw = tmp.measureText(text).width;
  const maxW = W*maxWidthRatio;
  if(tw > maxW){ px = px * (maxW/tw); }
  return Math.max(px, 18);
}

let nameBigTargets = [];
let nameSmallTargets = [];
let heartTargets = [];

function buildHeartTargets(count){
  const scale = (Math.min(W,H*0.9) * 0.62) / 32;
  const arr = [];
  for(let i=0;i<count;i++){
    const t = Math.random()*Math.PI*2;
    const r = Math.sqrt(Math.random());
    let hx = 16*Math.pow(Math.sin(t),3);
    let hy = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
    hx *= r; hy *= r;
    const z = (Math.random()-0.5)*46;
    arr.push({ x: hx*scale, y: -hy*scale, z });
  }
  return arr;
}

function rebuildTargets(){
  const bigFont = fitFontToWidth('Нателла', W*0.30, 0.88);
  const smallFont = fitFontToWidth('Нателла', W*0.15, 0.55);
  nameBigTargets = sampleText('Нателла', bigFont, isMobile ? 900 : 1500);
  nameSmallTargets = sampleText('Нателла', smallFont, isMobile ? 400 : 650);
  heartTargets = buildHeartTargets(N);
}

/* ---------- particles ---------- */
let N = isMobile ? 1500 : 2700;
let particles = [];

function initParticles(){
  particles = [];
  const heartRatio = 0.68;
  for(let i=0;i<N;i++){
    const corner = Math.floor(Math.random()*4);
    let sx, sy;
    const over = 60;
    if(corner===0){ sx = -over - Math.random()*W*0.3; sy = -over - Math.random()*H*0.3; }
    else if(corner===1){ sx = W+over + Math.random()*W*0.3; sy = -over - Math.random()*H*0.3; }
    else if(corner===2){ sx = -over - Math.random()*W*0.3; sy = H+over + Math.random()*H*0.3; }
    else { sx = W+over + Math.random()*W*0.3; sy = H+over + Math.random()*H*0.3; }

    const cType = Math.random();
    particles.push({
      slot: i,
      group: i < N*heartRatio ? 'heart' : 'name',
      x: sx, y: sy, vx:0, vy:0,
      jitterX: (Math.random()-0.5)*7,
      jitterY: (Math.random()-0.5)*7,
      zSmall: (Math.random()-0.5)*26,
      baseSize: Math.random()*2.2 + 1.4,
      colorType: cType < 0.46 ? 'pink' : (cType < 0.9 ? 'gold' : 'white'),
      bobSeed: Math.random()*Math.PI*2
    });
  }
}

rebuildTargets();
initParticles();

/* ---------- resize handling (debounced) ---------- */
let resizeTimer = null;
window.addEventListener('resize', function(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function(){
    resizeCanvas();
    buildStars();
    rebuildTargets();
  }, 220);
});

/* ---------- animation state ---------- */
const START_TIME = performance.now();
const TRANSITION_START = 8000;
let cameraTheta = 0;
let swirlBoost = 0;
let swirlApplied = false;
let lastMeteor = 0;
let lastFlash = 0;
let prevPhaseFinal = false;

function getNameBigLocal(p){
  const arr = nameBigTargets.length ? nameBigTargets : [{x:0,y:0}];
  const nt = arr[p.slot % arr.length];
  return {
    lx: nt.x + p.jitterX,
    ly: nt.y + p.jitterY,
    lz: p.zSmall,
    cx: W/2, cy: H*0.42
  };
}

function getFinalLocal(p, elapsed){
  if(p.group === 'heart'){
    const ht = heartTargets[p.slot % heartTargets.length];
    const pulse = 1 + Math.sin(elapsed*0.0032 + p.slot*0.001) * 0.06;
    return {
      lx: ht.x*pulse, ly: ht.y*pulse, lz: ht.z,
      cx: W/2, cy: H*0.60
    };
  } else {
    const arr = nameSmallTargets.length ? nameSmallTargets : [{x:0,y:0}];
    const nt = arr[p.slot % arr.length];
    const bob = Math.sin(elapsed*0.0016 + p.bobSeed) * 3;
    return {
      lx: nt.x + p.jitterX*0.55,
      ly: nt.y + p.jitterY*0.55 + bob,
      lz: p.zSmall*0.4,
      cx: W/2, cy: H*0.27
    };
  }
}

function project(local, theta){
  const rx = local.lx*Math.cos(theta) - local.lz*Math.sin(theta);
  const rz = local.lx*Math.sin(theta) + local.lz*Math.cos(theta);
  const focal = Math.max(W,H) * 0.9;
  const persp = focal/(focal+rz);
  return {
    tx: local.cx + rx*persp,
    ty: local.cy + local.ly*persp,
    scale: persp
  };
}

let lastTime = performance.now();

function frame(now){
  requestAnimationFrame(frame);
  let dt = now - lastTime;
  lastTime = now;
  if(dt > 60) dt = 60;
  const dtF = dt/16.6667;
  const elapsed = now - START_TIME;
  const isFinal = elapsed >= TRANSITION_START;

  if(isFinal && !prevPhaseFinal){
    swirlBoost = 1.5;
    swirlApplied = false;
  }
  prevPhaseFinal = isFinal;

  // camera rotation
  let theta;
  if(!isFinal){
    theta = Math.sin(elapsed*0.0005)*0.30;
  } else {
    cameraTheta += 0.00005*dt;
    swirlBoost *= Math.pow(0.05, dt/1600);
    theta = cameraTheta + Math.sin(elapsed*0.00035)*0.16 + swirlBoost*1.8;
  }

  // background fade (trail effect)
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(4,2,10,0.20)';
  ctx.fillRect(0,0,W,H);

  // stars
  const starAlphaGlobal = Math.min(1, elapsed/2200);
  for(let i=0;i<stars.length;i++){
    const s = stars[i];
    const tw = Math.sin(elapsed*s.speed + s.phase)*0.5+0.5;
    const a = (s.base + tw*0.4) * starAlphaGlobal;
    ctx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }

  // energy field behind forming name
  if(!isFinal){
    const pulse = Math.sin(elapsed*0.004)*0.5+0.5;
    const gx = W/2, gy = H*0.42;
    const grad = ctx.createRadialGradient(gx,gy,0,gx,gy, Math.min(W,H)*0.42);
    grad.addColorStop(0, `rgba(255,120,190,${0.16+pulse*0.10})`);
    grad.addColorStop(1, 'rgba(255,120,190,0)');
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);
  }

  // particles
  ctx.globalCompositeOperation = 'lighter';
  const introFade = Math.min(1, elapsed/900);
  const k = 0.05;
  const damping = Math.pow(0.90, dtF);

  for(let i=0;i<particles.length;i++){
    const p = particles[i];
    const local = isFinal ? getFinalLocal(p, elapsed) : getNameBigLocal(p);
    const proj = project(local, theta);

    if(isFinal && !swirlApplied){
      const ang = Math.atan2(p.y - H/2, p.x - W/2) + Math.PI/2;
      const force = 70 + Math.random()*90;
      p.vx += Math.cos(ang)*force*0.35;
      p.vy += Math.sin(ang)*force*0.35;
    }

    p.vx += (proj.tx - p.x) * k * dtF;
    p.vy += (proj.ty - p.y) * k * dtF;
    p.vx *= damping;
    p.vy *= damping;
    p.x += p.vx * dtF;
    p.y += p.vy * dtF;

    const scale = Math.max(0.25, Math.min(1.6, proj.scale));
    const size = p.baseSize * scale * SPR_SIZE * 0.09;
    const alpha = Math.max(0, Math.min(1, scale)) * introFade;

    let sprite = spritePink;
    if(p.colorType === 'gold') sprite = spriteGold;
    else if(p.colorType === 'white') sprite = spriteWhite;

    ctx.globalAlpha = alpha;
    ctx.drawImage(sprite, p.x - size/2, p.y - size/2, size, size);
  }
  ctx.globalAlpha = 1;

  // meteors (only in final phase)
  if(isFinal){
    if(now - lastMeteor > (isMobile ? 900 : 650)){
      lastMeteor = now;
      if(Math.random() < 0.85) spawnMeteor();
    }
    for(let i=meteors.length-1;i>=0;i--){
      const m = meteors[i];
      m.x += m.vx*dtF*0.15;
      m.y += m.vy*dtF*0.15;
      m.life -= 0.012*dtF;
      if(m.life <= 0 || m.y > H+40){ meteors.splice(i,1); continue; }
      const tailX = m.x - m.vx*0.12;
      const tailY = m.y - m.vy*0.12;
      const grad = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
      grad.addColorStop(0, `rgba(255,255,255,${0.9*m.life})`);
      grad.addColorStop(1, 'rgba(255,180,220,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(tailX, tailY);
      ctx.stroke();
    }

    // flashes
    if(now - lastFlash > 5200){
      lastFlash = now;
      spawnFlash(W/2 + (Math.random()-0.5)*W*0.2, H*0.60 + (Math.random()-0.5)*H*0.1);
    }
    for(let i=flashes.length-1;i>=0;i--){
      const f = flashes[i];
      f.r += (f.maxR - f.r) * 0.045 * dtF;
      f.alpha *= Math.pow(0.90, dtF);
      if(f.alpha < 0.01){ flashes.splice(i,1); continue; }
      const grad = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
      grad.addColorStop(0, `rgba(255,225,240,${f.alpha})`);
      grad.addColorStop(0.4, `rgba(255,150,210,${f.alpha*0.4})`);
      grad.addColorStop(1, 'rgba(255,150,210,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,W,H);
    }
  }

  if(isFinal && !swirlApplied) swirlApplied = true;
}

requestAnimationFrame(frame);

setTimeout(function(){
  document.getElementById('barTop').classList.add('show');
  document.getElementById('barBottom').classList.add('show');
}, 400);

})();
</script>
</body>
</html>
